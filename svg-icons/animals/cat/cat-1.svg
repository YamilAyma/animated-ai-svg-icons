<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <style>
      /* Dynamic Palette and Parameters */
      svg {
        --primary-color: #1A1A1C; /* Main Outline */
        --accent-color: #1A1A1C; /* Eyes and Nose/Mouth */
        --stroke-width: 5.5px; /* Border Thickness */
        --animation-duration: 5s; /* Speed of the peek cycle */
        --curve: cubic-bezier(0.34, 1.56, 0.64, 1); /* Playful elastic curve */
        --animation-loop: infinite; /* Loop Count */
        --animation-direction: normal; /* Play Direction */
      }

      /* Base Shape Styles */
      .cat-outline {
        fill: none;
        stroke: var(--primary-color);
        stroke-width: var(--stroke-width);
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }

      .cat-fill {
        fill: var(--accent-color);
      }

      /* Main container handling the pop-up (appear/disappear) animation */
      .cat-container {
        transform-origin: 50px 80px;
        animation-name: peek-a-boo;
        animation-duration: var(--animation-duration);
        animation-timing-function: var(--curve);
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      /* Inner head group handling the curious tilting */
      .cat-head {
        transform-origin: 50px 55px;
        animation-name: curious-tilt;
        animation-duration: var(--animation-duration);
        animation-timing-function: ease-in-out;
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      /* Eye blink animations */
      .left-eye {
        transform-origin: 34px 56px;
        animation-name: blink;
        animation-duration: var(--animation-duration);
        animation-timing-function: ease-in-out;
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      .right-eye {
        transform-origin: 66px 56px;
        animation-name: blink;
        animation-duration: var(--animation-duration);
        animation-timing-function: ease-in-out;
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      /* Whiskers twitching animations */
      .left-whiskers {
        transform-origin: 22px 57px;
        animation-name: twitch-left;
        animation-duration: var(--animation-duration);
        animation-timing-function: ease-in-out;
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      .right-whiskers {
        transform-origin: 78px 57px;
        animation-name: twitch-right;
        animation-duration: var(--animation-duration);
        animation-timing-function: ease-in-out;
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      /* --- Keyframes --- */

      /* 1. The cat appears from the bottom, stays, and hides again */
      @keyframes peek-a-boo {
        0%, 100% {
          transform: translateY(35px) scale(0.85);
          opacity: 0;
        }
        10%, 90% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }

      /* 2. Looking around curiously (tilting head left and right) */
      @keyframes curious-tilt {
        0%, 15%, 85%, 100% { transform: rotate(0deg); }
        25%, 45% { transform: rotate(12deg); }
        55%, 75% { transform: rotate(-12deg); }
      }

      /* 3. Blinking during pauses in the head movement */
      @keyframes blink {
        0%, 33%, 37%, 63%, 67%, 100% { transform: scaleY(1); }
        35%, 65% { transform: scaleY(0.1); }
      }

      /* 4. Whiskers wiggling when curious */
      @keyframes twitch-left {
        0%, 26%, 34%, 56%, 64%, 100% { transform: rotate(0deg); }
        30%, 60% { transform: rotate(10deg); }
      }

      @keyframes twitch-right {
        0%, 26%, 34%, 56%, 64%, 100% { transform: rotate(0deg); }
        30%, 60% { transform: rotate(-10deg); }
      }
    </style>
  </defs>

  <!-- Animated Cat Character Group -->
  <g class="cat-container">
    <g class="cat-head">
      
      <!-- Continuous Outer Ear and Forehead Line -->
      <!-- Drawn with straight lines and rounded corners to perfectly match the hand-drawn cute reference -->
      <path class="cat-outline" d="M 22 48 L 30 26 Q 32 22 36 26 L 43 40 Q 44 42 46 42 L 54 42 Q 56 42 57 40 L 64 26 Q 68 22 70 26 L 78 48" />
      
      <!-- Black Dot Eyes -->
      <circle class="cat-fill left-eye" cx="34" cy="56" r="4.5" />
      <circle class="cat-fill right-eye" cx="66" cy="56" r="4.5" />
      
      <!-- Curious Inverted 'Y/W' Mouth/Nose -->
      <path class="cat-outline" style="stroke: var(--accent-color);" d="M 43 65 Q 46.5 59 50 58 Q 53.5 59 57 65" />
      
      <!-- Left Whiskers -->
      <g class="left-whiskers cat-outline">
        <path d="M 12 50 L 22 54" />
        <path d="M 13 63 L 22 59" />
      </g>
      
      <!-- Right Whiskers -->
      <g class="right-whiskers cat-outline">
        <path d="M 88 50 L 78 54" />
        <path d="M 87 63 L 78 59" />
      </g>

    </g>
  </g>
</svg>