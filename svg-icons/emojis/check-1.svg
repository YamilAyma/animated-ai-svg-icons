<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <style>
      /* Scoped custom variables readable by modern live customizers */
      svg {
        /* Dynamic Palette */
        --primary-color: #5FAD25; /* Checkmark Green */
        
        /* Outline Properties */
        --stroke-width: 8px; /* Thick cute outline */
        
        /* Animation Timing */
        --animation-duration: 3.5s; /* Smooth motion speed */
        --curve: cubic-bezier(0.34, 1.56, 0.64, 1); /* Playful bounce easing */
        --draw-curve: ease-in-out; /* Smooth draw-in easing */
        --animation-loop: infinite; /* Seamless loop */
        --animation-direction: normal; /* Forward play */
      }

      /* Group wrapper handles the scale and rotation pop effect */
      .check-wrapper {
        transform-origin: 50px 50px;
        animation-name: pop-in;
        animation-duration: var(--animation-duration);
        animation-timing-function: var(--curve);
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      /* Path handles the actual draw-in and erase-out lines */
      .check-path {
        fill: none;
        stroke: var(--primary-color);
        stroke-width: var(--stroke-width);
        stroke-linecap: round;
        stroke-linejoin: round;
        
        /* Do NOT use vector-effect here because we are animating stroke dashes */
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation-name: draw-path;
        animation-duration: var(--animation-duration);
        animation-timing-function: var(--draw-curve);
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      /* Keyframes for seamless drawing and erasing */
      @keyframes draw-path {
        0%, 10% { 
          stroke-dashoffset: 100; /* Fully hidden */
        }
        35%, 65% { 
          stroke-dashoffset: 0; /* Fully drawn */
        }
        90%, 100% { 
          stroke-dashoffset: -100; /* Erased completely in the forward direction */
        }
      }

      /* Keyframes for micro-animation bounce effect */
      @keyframes pop-in {
        0%, 25% { 
          transform: scale(0.8) rotate(-10deg); 
        }
        35%, 65% { 
          transform: scale(1) rotate(0deg); 
        }
        75%, 100% { 
          transform: scale(0.8) rotate(10deg); 
        }
      }
    </style>
  </defs>

  <!-- Group wrapper handles scaling while path handles drawing -->
  <g class="check-wrapper">
    <path class="check-path" d="M 25 52 L 42 70 L 78 28" />
  </g>
</svg>