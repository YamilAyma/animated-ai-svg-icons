<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <style>
      /* Scoped variables for granular structural control and dynamic theming */
      svg {
        --primary-color: #111111; /* Heavy Outline Contour */
        --accent-color: #FFB800; /* Warm Attention Fill */
        --stroke-width: 6.5px; /* Thick Outline Thickness for hand-drawn feel */
        
        /* Timing properties */
        --animation-duration: 2s; /* Total Loop Duration */
        --curve: linear; /* Easing curve for stepped sequence */
        --animation-loop: infinite; /* Play Iteration */
        --animation-direction: normal; /* Play Direction */
      }

      /* Base geometry stylings */
      .wedge-shape {
        fill: var(--accent-color);
        stroke: var(--primary-color);
        stroke-width: var(--stroke-width);
        
        /* Rounding joins heavily simulates the organic, inked style of the reference */
        stroke-linecap: round;
        stroke-linejoin: round;
        
        /* Central coordinate mapping for an outward burst projection */
        transform-origin: 25px 75px; 
        
        /* Linear timing forces reliance on explicit hard keyframe boundaries below */
        animation-duration: var(--animation-duration);
        animation-timing-function: var(--curve); 
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      /* Layer separation for staggered frame sequence initialization */
      .layer-primary {
        animation-name: stepped-sequence-primary;
      }

      .layer-secondary {
        animation-name: stepped-sequence-secondary;
      }

      /* 
        Explicit fractional percentages (0.01% delta) enforce instant 
        value jumps to achieve a strict stepped/frame-based render, 
        simulating low-framerate 2D cel timing.
      */
      
      @keyframes stepped-sequence-primary {
        0%, 9.99% { opacity: 0; transform: scale(0.4); }
        10%, 14.99% { opacity: 1; transform: scale(1.1); }
        15%, 84.99% { opacity: 1; transform: scale(1); }
        85%, 100% { opacity: 0; transform: scale(1); }
      }

      @keyframes stepped-sequence-secondary {
        0%, 14.99% { opacity: 0; transform: scale(0.4); }
        15%, 19.99% { opacity: 1; transform: scale(1.1); }
        20%, 84.99% { opacity: 1; transform: scale(1); }
        85%, 100% { opacity: 0; transform: scale(1); }
      }
    </style>
  </defs>

  <!-- Group handling the collective visual array -->
  <g class="attention-burst-group">
    
    <!-- Top major vertical element -->
    <polygon class="wedge-shape layer-primary" 
             points="24,51 32,17 52,21 36,53" />
             
    <!-- Mid secondary outward element -->
    <polygon class="wedge-shape layer-secondary" 
             points="36,61 63,41 76,53 44,67" />
             
    <!-- Bottom horizontal element -->
    <polygon class="wedge-shape layer-primary" 
             points="41,75 61,72 64,83 43,83" />
             
  </g>
</svg>