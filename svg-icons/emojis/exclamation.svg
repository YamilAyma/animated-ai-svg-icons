<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <style>
      /* Scoped custom variables for dynamic customization */
      svg {
        --primary-color: #69A1DA; /* Outer Border */
        --secondary-color: #99CBE9; /* Inner Fill */
        --stroke-width: 5.4px; /* Thick Outer Outline */
        --stroke-width-inner: 4.8px; /* Inner Outline */
        --animation-duration: 3.5s; /* Animation Speed */
        --curve: ease-in-out; /* Easing Curve */
        --animation-loop: infinite; /* Loop Count */
        --animation-direction: normal; /* Play Direction */
      }

      /* Animated container with precise origin */
      .exclamation {
        transform-origin: 50px 48px; 
        animation-name: bounce-in-out;
        animation-duration: var(--animation-duration);
        animation-timing-function: var(--curve);
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      /* Granular bounce keyframes */
      @keyframes bounce-in-out {
        0% {
          transform: scale(0);
          animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        15% {
          transform: scale(1);
          animation-timing-function: ease-in-out;
        }
        50% {
          transform: scale(1.04); 
          animation-timing-function: ease-in-out;
        }
        80% {
          transform: scale(1);
          animation-timing-function: cubic-bezier(0.36, 0, 0.66, -0.56); 
        }
        95%, 100% {
          transform: scale(0); 
        }
      }
    </style>

    <path id="stick" d="M 42.5 21 Q 50 18 57.5 21 L 55.4 55.5 Q 50 58.5 44.6 55.5 Z" />
    <circle id="dot" cx="50" cy="73.5" r="5.4" />
  </defs>

  <g class="exclamation">
    <!-- Outer bubbly border -->
    <use href="#stick" fill="none" stroke="var(--primary-color)" stroke-width="var(--stroke-width)" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0 4.2" />
    <use href="#dot" fill="none" stroke="var(--primary-color)" stroke-width="var(--stroke-width)" stroke-linecap="round" stroke-dasharray="0 4.2" />

    <!-- Solid base border -->
    <use href="#stick" fill="none" stroke="var(--primary-color)" stroke-width="var(--stroke-width-inner)" stroke-linejoin="round" />
    <use href="#dot" fill="none" stroke="var(--primary-color)" stroke-width="var(--stroke-width-inner)" />

    <!-- Inner colored fill -->
    <use href="#stick" fill="var(--secondary-color)" />
    <use href="#dot" fill="var(--secondary-color)" />
  </g>
</svg>