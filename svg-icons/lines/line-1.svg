<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Filter for chalk texture scaled down by 10 -->
    <filter id="brush-edge" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.35" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <!-- Scaled down masking geometry (divided by 10) -->
    <mask id="draw-mask">
      <path class="mask-main" d="M 80 25 C 65 5, 35 20, 40 45 C 45 65, 75 70, 75 55 C 75 40, 50 40, 20 75" 
            fill="none" stroke="white" stroke-width="15" stroke-linecap="round" pathLength="100"/>
      <path class="mask-barb-left" d="M 20 75 L 12 62" 
            fill="none" stroke="white" stroke-width="10" stroke-linecap="round" pathLength="100"/>
      <path class="mask-barb-right" d="M 20 75 L 32 73" 
            fill="none" stroke="white" stroke-width="10" stroke-linecap="round" pathLength="100"/>
    </mask>

    <style>
      /* Scoped custom variables */
      svg {
        --primary-color: #81258F; /* Main Arrow Color */
        --animation-duration: 4.5s; /* Animation Speed */
        --curve: cubic-bezier(0.4, 0.0, 0.2, 1); /* Transition Curve */
        --animation-loop: infinite; /* Loop Iteration */
        --animation-direction: normal; /* Play Direction */
      }

      /* Granular animations */
      .mask-main {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation-name: drawLine;
        animation-duration: var(--animation-duration);
        animation-timing-function: var(--curve);
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      .mask-barb-left {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation-name: drawBarbLeft;
        animation-duration: var(--animation-duration);
        animation-timing-function: var(--curve);
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      .mask-barb-right {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation-name: drawBarbRight;
        animation-duration: var(--animation-duration);
        animation-timing-function: var(--curve);
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      @keyframes drawLine {
        0%, 10% { stroke-dashoffset: 100; }
        45%, 65% { stroke-dashoffset: 0; }
        90%, 100% { stroke-dashoffset: -100; }
      }

      @keyframes drawBarbLeft {
        0%, 40% { stroke-dashoffset: 100; }
        50%, 65% { stroke-dashoffset: 0; }
        90%, 100% { stroke-dashoffset: -100; }
      }

      @keyframes drawBarbRight {
        0%, 42% { stroke-dashoffset: 100; }
        52%, 65% { stroke-dashoffset: 0; }
        90%, 100% { stroke-dashoffset: -100; }
      }
    </style>
  </defs>

  <g mask="url(#draw-mask)" filter="url(#brush-edge)">
    <!-- Base solid line -->
    <path d="M 80 25 C 65 5, 35 20, 40 45 C 45 65, 75 70, 75 55 C 75 40, 50 40, 20 75" 
          fill="none" stroke="var(--primary-color)" stroke-width="3.8" stroke-linecap="round"/>
    
    <!-- Shifting stroke fragments for organic volume -->
    <path d="M 80 25 C 65 5, 35 20, 40 45 C 45 65, 75 70, 75 55 C 75 40, 50 40, 20 75" 
          fill="none" stroke="var(--primary-color)" stroke-width="1.4" stroke-linecap="round" transform="translate(1.8, -1.2)" opacity="0.8"/>
    <path d="M 80 25 C 65 5, 35 20, 40 45 C 45 65, 75 70, 75 55 C 75 40, 50 40, 20 75" 
          fill="none" stroke="var(--primary-color)" stroke-width="0.8" stroke-linecap="round" transform="translate(-1.6, 1.4)" opacity="0.6"/>

    <!-- Dry brush textures -->
    <path d="M 80 25 C 65 5, 35 20, 40 45 C 45 65, 75 70, 75 55 C 75 40, 50 40, 20 75" 
          fill="none" stroke="var(--primary-color)" stroke-width="0.6" stroke-linecap="round" transform="translate(2.5, -0.5)" stroke-dasharray="4 3 1.5 5 10 2"/>
    <path d="M 80 25 C 65 5, 35 20, 40 45 C 45 65, 75 70, 75 55 C 75 40, 50 40, 20 75" 
          fill="none" stroke="var(--primary-color)" stroke-width="0.4" stroke-linecap="round" transform="translate(-2.2, 0)" stroke-dasharray="1 5 6 1 3 8"/>

    <!-- Left barb shape details -->
    <path d="M 19.5 74.5 L 12 62" fill="none" stroke="var(--primary-color)" stroke-width="4.5" stroke-linecap="square"/>
    <path d="M 19.5 74.5 L 12 62" fill="none" stroke="var(--primary-color)" stroke-width="1.2" stroke-linecap="round" transform="translate(-1.5, 1)" opacity="0.7"/>
    <path d="M 19.5 74.5 L 12 62" fill="none" stroke="var(--primary-color)" stroke-width="1.8" stroke-linecap="round" transform="translate(1, -0.5)" opacity="0.9"/>

    <!-- Right barb shape details -->
    <path d="M 21.5 74.5 L 32 73" fill="none" stroke="var(--primary-color)" stroke-width="4" stroke-linecap="square"/>
    <path d="M 21.5 74.5 L 32 73" fill="none" stroke="var(--primary-color)" stroke-width="1.5" stroke-linecap="round" transform="translate(0.5, 1.5)" opacity="0.8"/>
    <path d="M 21.5 74.5 L 32 73" fill="none" stroke="var(--primary-color)" stroke-width="0.8" stroke-linecap="round" transform="translate(1.5, -1)" stroke-dasharray="2 1 4"/>
  </g>
</svg>