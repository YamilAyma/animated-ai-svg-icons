<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Filter for chalk texture scaled down by 5 -->
    <filter id="chalk-texture" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <!-- Scaled down masking geometry (divided by 5) -->
    <mask id="draw-mask">
      <path class="anim-main" d="M 80,76 C 96,30 50,10 20,44 L 14,58" 
            fill="none" stroke="white" stroke-width="14" stroke-linecap="round" pathLength="100"/>
      <path class="anim-barb" d="M 14,58 L 9,36" 
            fill="none" stroke="white" stroke-width="10" stroke-linecap="round" pathLength="100"/>
      <path class="anim-barb" d="M 14,58 L 32,46" 
            fill="none" stroke="white" stroke-width="10" stroke-linecap="round" pathLength="100"/>
    </mask>

    <style>
      /* Scoped custom variables */
      svg {
        --primary-color: #30A3E6; /* Main Arrow Color */
        --stroke-width: 5.6px; /* Outline Thickness */
        --animation-duration: 4s; /* Animation Speed */
        --curve: cubic-bezier(0.4, 0.0, 0.2, 1); /* Timing Curve */
        --animation-loop: infinite; /* Loop Count */
        --animation-direction: normal; /* Play Direction */
      }

      /* Granular animations */
      .anim-main {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation-name: draw-line;
        animation-duration: var(--animation-duration);
        animation-timing-function: var(--curve);
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      .anim-barb {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation-name: draw-head;
        animation-duration: var(--animation-duration);
        animation-timing-function: var(--curve);
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      @keyframes draw-line {
        0%, 10% { stroke-dashoffset: 100; } 
        40%, 65% { stroke-dashoffset: 0; }  
        90%, 100% { stroke-dashoffset: -100; } 
      }

      @keyframes draw-head {
        0%, 32% { stroke-dashoffset: 100; } 
        45%, 65% { stroke-dashoffset: 0; }  
        85%, 100% { stroke-dashoffset: -100; } 
      }
    </style>
  </defs>

  <g mask="url(#draw-mask)" filter="url(#chalk-texture)">
    <g fill="none" stroke="var(--primary-color)" stroke-linecap="round" stroke-linejoin="round">
        <!-- Main body strokes (divided by 5) -->
        <path d="M 80,76 C 96,30 50,10 20,44 L 14,58" stroke-width="5.6" />
        <path d="M 80,76 C 96,30 50,10 20,44 L 14,58" stroke-width="2.8" opacity="0.6" transform="translate(1.2, -0.8)"/>
        <path d="M 80,76 C 96,30 50,10 20,44 L 14,58" stroke-width="2" opacity="0.5" transform="translate(-1, 1.2)"/>
        <path d="M 80,76 C 96,30 50,10 20,44 L 14,58" stroke-width="1.2" stroke-dasharray="1 3 5 2" transform="translate(1.8, 1.8)"/>
        <path d="M 80,76 C 96,30 50,10 20,44 L 14,58" stroke-width="0.8" stroke-dasharray="2 1.6 6 1" transform="translate(-1.6, -1.6)" opacity="0.8"/>

        <!-- Left tip (divided by 5) -->
        <path d="M 14,58 L 9,36" stroke-width="4.8" />
        <path d="M 14,58 L 9,36" stroke-width="2.4" opacity="0.7" transform="translate(-0.8, 0.4)"/>
        <path d="M 14,58 L 9,36" stroke-width="1.2" opacity="0.5" stroke-dasharray="0.8 2" transform="translate(1, -0.6)"/>

        <!-- Right tip (divided by 5) -->
        <path d="M 14,58 L 32,46" stroke-width="4.8" />
        <path d="M 14,58 L 32,46" stroke-width="2.4" opacity="0.7" transform="translate(0.4, -1)"/>
        <path d="M 14,58 L 32,46" stroke-width="1.2" opacity="0.5" stroke-dasharray="1.2 2.4" transform="translate(-0.6, 0.8)"/>
    </g>
  </g>
</svg>