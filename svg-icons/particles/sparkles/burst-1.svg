<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <style>
      /* Scoped custom variables */
      svg {
        --primary-color: #FF9824; /* Spark Accent Color */
        --animation-duration: 3s; /* Animation Speed */
        --curve: ease-in-out; /* Easing Curve */
        --animation-loop: infinite; /* Loop Count */
        --animation-direction: normal; /* Play Direction */
      }

      /* Granular animation declarations */
      .spark {
        fill: var(--primary-color);
        opacity: 0;
        animation-name: spark-burst;
        animation-duration: var(--animation-duration);
        animation-timing-function: var(--curve);
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      /* Precise transform origins scaled by 2 */
      .spark-left {
        transform-origin: 34px 71px;
        animation-delay: 0s;
      }
      
      .spark-middle {
        transform-origin: 37.5px 74px;
        animation-delay: 0.15s;
      }
      
      .spark-right {
        transform-origin: 41.5px 78px;
        animation-delay: 0.3s;
      }

      /* Bounce keyframes */
      @keyframes spark-burst {
        0% { 
          transform: scale(0); 
          opacity: 0;
          animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        15%, 80% { 
          transform: scale(1); 
          opacity: 1;
        }
        80.01% {
          animation-timing-function: cubic-bezier(0.36, 0, 0.66, -0.56); 
        }
        95%, 100% { 
          transform: scale(0); 
          opacity: 0;
        }
      }
    </style>
  </defs>

  <g>
    <!-- Scaled coordinate paths (divided by 2) -->
    <path class="spark spark-left" 
          d="M 34,71 C 20,45 22.5,22.5 32.5,20 C 37.5,19 41,25 36,35 C 32.5,42.5 34,57.5 34,71 Z" />

    <path class="spark spark-middle" 
          d="M 37.5,74 C 42.5,50 57.5,35 67.5,35 C 74,35 75,42.5 69,49 C 59,59 47.5,67.5 37.5,74 Z" />

    <path class="spark spark-right" 
          d="M 41.5,78 C 55,67.5 75,57.5 87.5,60 C 95,61.5 92.5,71 84,72.5 C 69,75 52.5,77.5 41.5,78 Z" />
  </g>
</svg>