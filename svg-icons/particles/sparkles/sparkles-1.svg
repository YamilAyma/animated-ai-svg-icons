<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Original sparkle path center at 0,0 -->
    <path id="sparkle" 
          d="M 0,-22 Q 5,-5 22,0 Q 5,5 0,22 Q -5,5 -22,0 Q -5,-5 0,-22 Z" 
          fill="var(--primary-color)" 
          stroke="var(--primary-color)" 
          stroke-width="var(--stroke-width)" 
          stroke-linejoin="round" 
          stroke-linecap="round"
          vector-effect="non-scaling-stroke" />

    <style>
      /* Scoped custom variables */
      svg {
        --primary-color: #3C95EA; /* Sparkle Color */
        --stroke-width: 8px; /* Sparkle Border (will scale down to 4px via transform) */
        --animation-duration: 2.4s; /* Speed */
        --curve: ease-in-out; /* Easing Curve */
        --animation-loop: infinite; /* Loop Count */
        --animation-direction: normal; /* Play Direction */
      }

      /* Granular property animations */
      .star {
        transform-origin: 0 0; /* Star path is centered at local 0,0 */
        animation-name: twinkle;
        animation-duration: var(--animation-duration);
        animation-timing-function: var(--curve);
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      /* Scale delay configurations */
      .star-1 {
        --max-scale: 1.3;
        animation-delay: 0s;
      }
      
      .star-2 {
        --max-scale: 0.65;
        animation-delay: -0.8s;
      }
      
      .star-3 {
        --max-scale: 0.85;
        animation-delay: -1.6s;
      }

      /* Bouncy twinkle rotate keyframes */
      @keyframes twinkle {
        0%, 100% {
          transform: scale(0) rotate(0deg);
          opacity: 0;
        }
        50% {
          transform: scale(var(--max-scale)) rotate(90deg);
          opacity: 1;
        }
      }
    </style>
  </defs>

  <!-- Scale transform by 0.5 to fit 200x200 canvas inside 100x100 viewBox perfectly -->
  <g transform="scale(0.5)">
    <g transform="translate(80, 105)">
      <use href="#sparkle" class="star star-1" />
    </g>

    <g transform="translate(120, 65)">
      <use href="#sparkle" class="star star-2" />
    </g>

    <g transform="translate(140, 120)">
      <use href="#sparkle" class="star star-3" />
    </g>
  </g>
</svg>