<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <style>
      /* Scoped custom variables */
      svg {
        --primary-color: #FFD412; /* Ray Color */
        --stroke-width: 5px; /* Ray Thickness */
        --animation-duration: 2.5s; /* Animation Speed */
        --curve: ease-in-out; /* Easing Curve */
        --animation-loop: infinite; /* Loop Count */
        --animation-direction: normal; /* Play Direction */
      }

      /* Animated rays using granular declarations */
      .ray {
        stroke: var(--primary-color);
        stroke-width: var(--stroke-width);
        stroke-linecap: round; 
        stroke-dasharray: 40; 
        stroke-dashoffset: 40; 
        
        animation-name: shoot-ray;
        animation-duration: var(--animation-duration);
        animation-timing-function: var(--curve);
        animation-iteration-count: var(--animation-loop);
        animation-direction: var(--animation-direction);
      }

      /* Stagger delays */
      .ray-center { animation-delay: 0s; }
      .ray-inner  { animation-delay: 0.1s; }
      .ray-mid    { animation-delay: 0.2s; }
      .ray-outer  { animation-delay: 0.3s; }

      /* Bounded loop keyframes */
      @keyframes shoot-ray {
        0% {
          stroke-dashoffset: 40; 
          opacity: 1;
        }
        35%, 55% {
          stroke-dashoffset: 0; 
          opacity: 1;
        }
        90%, 100% {
          stroke-dashoffset: -40; 
          opacity: 0;
        }
      }
    </style>
  </defs>

  <!-- Translates base to center-bottom of 100x100 box -->
  <g transform="translate(50, 75)">
    <!-- Center Ray (Longest) -->
    <line x1="0" y1="-15" x2="0" y2="-50" class="ray ray-center" />

    <!-- Inner Rays (+/- 26 degrees) -->
    <line x1="0" y1="-15" x2="0" y2="-45" transform="rotate(26)" class="ray ray-inner" />
    <line x1="0" y1="-15" x2="0" y2="-45" transform="rotate(-26)" class="ray ray-inner" />

    <!-- Medium Rays (+/- 52 degrees) -->
    <line x1="0" y1="-15" x2="0" y2="-40" transform="rotate(52)" class="ray ray-mid" />
    <line x1="0" y1="-15" x2="0" y2="-40" transform="rotate(-52)" class="ray ray-mid" />

    <!-- Outer Rays (+/- 76 degrees, the shortest) -->
    <line x1="0" y1="-15" x2="0" y2="-35" transform="rotate(76)" class="ray ray-outer" />
    <line x1="0" y1="-15" x2="0" y2="-35" transform="rotate(-76)" class="ray ray-outer" />
  </g>
</svg>